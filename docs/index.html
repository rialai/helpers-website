<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helpers.ie</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      color: #111111;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .statement {
      width: min(680px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0 0 28px;
      font-size: clamp(1.9rem, 4vw, 3.2rem);
      line-height: 1.1;
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 14px;
    }

    li {
      font-size: clamp(1.05rem, 2vw, 1.4rem);
      line-height: 1.35;
      font-weight: 400;
    }

    @media (max-width: 640px) {
      body {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="statement">
    <h1>Operations we run for microbusinesses</h1>
    <ul>
      <li>Fund advertising to bring in clients</li>
      <li>Design and deploy software into operations</li>
      <li>Standardize workflows and accountability</li>
      <li>Route demand to the most reliable operators</li>
    </ul>
  </main>
</body>
</html>
