<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helpers.ie</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap');
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ebe2; }
    canvas { display: block; touch-action: none; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H, cx, cy;

    function resize() {
      W = window.innerWidth; H = window.innerHeight;
      canvas.width = W * dpr; canvas.height = H * dpr;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cx = W / 2; cy = H / 2;
    }
    resize();
    window.addEventListener('resize', () => { ctx.resetTransform(); resize(); });

    const startTime = performance.now();
    const pointer = { x: -999, y: -999 };

    /* ── Palette — warm, muted, ARETE-inspired ── */
    const INK    = [38, 35, 30];       // dark warm charcoal
    const WARM   = [160, 148, 130];    // warm gray for lines
    const FAINT  = [195, 185, 168];    // fainter warm gray
    const BG     = [240, 235, 226];    // cream background
    const GREEN  = [58, 105, 78];      // muted forest — Celtic accent
    const GOLD_M = [168, 142, 90];     // muted gold

    const SERIF = '"EB Garamond", Georgia, "Palatino Linotype", Palatino, serif';

    function rgba(c, a) { return `rgba(${c[0]},${c[1]},${c[2]},${a})`; }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }
    function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
    function clamp(v) { return Math.max(0, Math.min(1, v)); }

    /* ── Layout ── */
    function getLayout() {
      const portrait = H > W * 1.2;
      const s = Math.min(W, H);
      if (portrait) {
        const sp = s * 0.30;
        return {
          cnx: cx, cny: H * 0.25,
          lx: cx - sp * 0.7, ly: H * 0.54,
          rx: cx + sp * 0.7, ry: H * 0.54,
          m1x: cx - sp * 1.4, m1y: H * 0.54 - sp * 0.5,
          m2x: cx - sp * 1.5, m2y: H * 0.54 + sp * 0.4,
        };
      }
      const sp = s * 0.32, cs = s * 0.19;
      return {
        cnx: cx, cny: cy - sp * 0.22,
        lx: cx - sp, ly: cy + sp * 0.6,
        rx: cx + sp, ry: cy + sp * 0.6,
        m1x: cx - sp - cs * 0.8, m1y: cy + sp * 0.6 - cs * 0.95,
        m2x: cx - sp - cs * 1.15, m2y: cy + sp * 0.6 + cs * 0.2,
      };
    }

    /* ── Interaction ── */
    function hitNodeadline() {
      const { rx, ry } = getLayout();
      return Math.hypot(pointer.x - rx, pointer.y - ry) < 44;
    }
    canvas.addEventListener('mousemove', e => { pointer.x = e.clientX; pointer.y = e.clientY; });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      pointer.x = e.touches[0].clientX; pointer.y = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchstart', e => {
      pointer.x = e.touches[0].clientX; pointer.y = e.touches[0].clientY;
    }, { passive: true });
    function openNodeadline() { if (hitNodeadline()) window.open('https://nodeadline.ie', '_blank'); }
    canvas.addEventListener('click', openNodeadline);
    canvas.addEventListener('touchend', e => {
      pointer.x = e.changedTouches[0].clientX; pointer.y = e.changedTouches[0].clientY;
      openNodeadline();
    });

    /* ── Triskelion (Newgrange-style watermark) ── */
    function triskelionPath(size) {
      const arms = 3, spiralTurns = 1.8, spiralSteps = 80;
      const armLen = size * 0.55, spiralR = size * 0.32;
      const paths = [];
      for (let a = 0; a < arms; a++) {
        const base = (a / arms) * Math.PI * 2 - Math.PI / 2;
        const pts = [];
        const armSteps = 30;
        for (let i = 0; i <= armSteps; i++) {
          const f = i / armSteps, r = f * armLen;
          const bend = Math.sin(f * Math.PI) * 0.3;
          const ang = base + bend;
          pts.push([Math.cos(ang) * r, Math.sin(ang) * r]);
        }
        const tipX = pts[pts.length - 1][0], tipY = pts[pts.length - 1][1];
        const sc = [
          tipX + Math.cos(base + Math.PI * 0.5) * spiralR * 0.35,
          tipY + Math.sin(base + Math.PI * 0.5) * spiralR * 0.35,
        ];
        for (let i = 1; i <= spiralSteps; i++) {
          const f = i / spiralSteps, shrink = 1 - f;
          const ang = base + Math.PI * 0.5 + f * spiralTurns * Math.PI * 2;
          const r = spiralR * shrink;
          pts.push([sc[0] + Math.cos(ang) * r, sc[1] + Math.sin(ang) * r]);
        }
        paths.push(pts);
      }
      return paths;
    }

    let _triCache = null;
    function getTriPaths(size) {
      if (!_triCache || Math.abs(_triCache.s - size) > 1) _triCache = { s: size, p: triskelionPath(size) };
      return _triCache.p;
    }

    function drawTriskelion(x, y, size, rot, alpha) {
      const paths = getTriPaths(size);
      ctx.save();
      ctx.translate(x, y); ctx.rotate(rot);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = rgba(FAINT, 0.6);
      ctx.lineWidth = 0.7;
      for (const pts of paths) {
        ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }

    /* ── Bezier edge from A to B with organic curve ── */
    function drawEdge(ax, ay, bx, by, progress, alpha, bend) {
      const ex = ax + (bx - ax) * progress;
      const ey = ay + (by - ay) * progress;
      const mx = (ax + ex) / 2 + bend;
      const my = (ay + ey) / 2 - Math.abs(bend) * 0.5;
      ctx.beginPath();
      ctx.moveTo(ax, ay);
      ctx.quadraticCurveTo(mx, my, ex, ey);
      ctx.strokeStyle = rgba(WARM, alpha);
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }

    /* ── Flowing dot along a bezier ── */
    function bezierPoint(ax, ay, mx, my, bx, by, t) {
      const u = 1 - t;
      return [u * u * ax + 2 * u * t * mx + t * t * bx, u * u * ay + 2 * u * t * my + t * t * by];
    }

    /* ── Main render ── */
    function frame(now) {
      const t = (now - startTime) / 1000;

      // clear to warm cream
      ctx.fillStyle = rgba(BG, 1);
      ctx.fillRect(0, 0, W, H);

      const L = getLayout();
      const { cnx, cny, lx, ly, rx, ry, m1x, m1y, m2x, m2y } = L;
      const cP  = easeOut(clamp(t / 0.8));
      const eP  = easeOut(clamp((t - 0.6) / 1.2));
      const nP  = easeOut(clamp((t - 1.6) / 0.7));
      const lP  = easeOut(clamp((t - 2.8) / 1.0));
      const rHov = hitNodeadline();
      canvas.style.cursor = rHov ? 'pointer' : 'default';

      /* ═══ Triskelion watermark ═══ */
      const triA = Math.min(cP * 0.5, 0.16);
      const triS = Math.min(W, H) * 0.28;
      drawTriskelion(cnx, cny, triS, t * 0.015, triA);

      /* ═══ Edges — organic bezier curves ═══ */
      const bendL = -25, bendR = 25;
      if (eP > 0) {
        drawEdge(cnx, cny, lx, ly, eP, 0.35 * cP, bendL);
        drawEdge(cnx, cny, rx, ry, eP, 0.35 * cP, bendR);
      }

      /* ═══ Flowing dots along edges ═══ */
      if (t > 2.2 && eP > 0.5) {
        const fadeIn = clamp((t - 2.2) / 2);
        [[lx, ly, bendL, 0], [rx, ry, bendR, 2.1]].forEach(([bx, by, bend, off]) => {
          const mx = (cnx + bx) / 2 + bend;
          const my = (cny + by) / 2 - Math.abs(bend) * 0.5;
          // two dots per edge, offset in time
          [0, 0.45].forEach(phOff => {
            const cycle = ((t * 0.18 + off + phOff) % 1);
            const pos = easeInOut(cycle);
            const [px, py] = bezierPoint(cnx, cny, mx, my, bx, by, pos);
            const a = Math.sin(cycle * Math.PI) * 0.4 * fadeIn;
            if (a > 0.01) {
              ctx.beginPath(); ctx.arc(px, py, 1.8, 0, Math.PI * 2);
              ctx.fillStyle = rgba(GREEN, a); ctx.fill();
            }
          });
        });
      }

      /* ═══ Child edges — bezier ═══ */
      if (lP > 0) {
        [[m1x, m1y, -12], [m2x, m2y, -18]].forEach(([nx, ny, bend]) => {
          drawEdge(lx, ly, nx, ny, lP, 0.25 * lP, bend);
        });
      }

      /* ═══ NODE — center .ie ═══ */
      const cR = 28;

      // very subtle halo
      const hG = ctx.createRadialGradient(cnx, cny, cR, cnx, cny, cR * 3);
      hG.addColorStop(0, rgba(GREEN, 0.04 * cP));
      hG.addColorStop(1, rgba(BG, 0));
      ctx.fillStyle = hG;
      ctx.beginPath(); ctx.arc(cnx, cny, cR * 3, 0, Math.PI * 2); ctx.fill();

      // thin outer ring — gold accent
      ctx.beginPath(); ctx.arc(cnx, cny, cR + 3, 0, Math.PI * 2);
      ctx.strokeStyle = rgba(GOLD_M, 0.18 * cP); ctx.lineWidth = 0.5; ctx.stroke();

      // main circle — thin outlined
      ctx.beginPath(); ctx.arc(cnx, cny, cR, 0, Math.PI * 2);
      ctx.fillStyle = rgba(BG, cP); ctx.fill();
      ctx.strokeStyle = rgba(INK, 0.55 * cP); ctx.lineWidth = 1; ctx.stroke();

      // label
      ctx.font = `500 16px ${SERIF}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = rgba(INK, 0.85 * cP);
      ctx.fillText('.ie', cnx, cny + 1);

      /* ═══ NODE — helpers (active) ═══ */
      const nR = 22;

      // active indicator — subtle green fill
      ctx.beginPath(); ctx.arc(lx, ly, nR, 0, Math.PI * 2);
      ctx.fillStyle = rgba(GREEN, 0.06 * nP); ctx.fill();
      ctx.strokeStyle = rgba(INK, 0.5 * nP); ctx.lineWidth = 0.8; ctx.stroke();

      // thin gold ring — active marker
      ctx.beginPath(); ctx.arc(lx, ly, nR + 3, 0, Math.PI * 2);
      ctx.strokeStyle = rgba(GOLD_M, 0.22 * nP); ctx.lineWidth = 0.5; ctx.stroke();

      // label
      ctx.font = `500 14px ${SERIF}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = rgba(INK, 0.8 * nP);
      ctx.fillText('helpers', lx, ly + 1);

      /* ═══ NODE — nodeadline (link) ═══ */
      const hovFade = rHov ? 0.65 : 0.30;

      ctx.beginPath(); ctx.arc(rx, ry, nR, 0, Math.PI * 2);
      ctx.fillStyle = rgba(BG, nP); ctx.fill();
      ctx.strokeStyle = rgba(WARM, hovFade * nP);
      ctx.lineWidth = rHov ? 1 : 0.7; ctx.stroke();

      // label below
      ctx.font = `400 14px ${SERIF}`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillStyle = rgba(INK, (rHov ? 0.7 : 0.4) * nP);
      ctx.fillText('nodeadline', rx, ry + nR + 10);
      if (rHov) {
        const tw = ctx.measureText('nodeadline').width;
        ctx.fillStyle = rgba(WARM, 0.45 * nP);
        ctx.fillText('\u2197', rx + tw / 2 + 6, ry + nR + 10);
      }

      /* ═══ NODES — children ═══ */
      if (lP > 0) {
        [[m1x, m1y, 'material'], [m2x, m2y, 'intangible']].forEach(([nx, ny, label]) => {
          const r = 12;
          ctx.beginPath(); ctx.arc(nx, ny, r, 0, Math.PI * 2);
          ctx.fillStyle = rgba(BG, lP); ctx.fill();
          ctx.strokeStyle = rgba(WARM, 0.35 * lP); ctx.lineWidth = 0.6; ctx.stroke();

          // tiny green center dot
          ctx.beginPath(); ctx.arc(nx, ny, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = rgba(GREEN, 0.3 * lP); ctx.fill();

          // label
          ctx.font = `400 12px ${SERIF}`;
          ctx.textAlign = nx < lx ? 'right' : 'left';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = rgba(INK, 0.45 * lP);
          ctx.fillText(label, nx < lx ? nx - 20 : nx + 20, ny);
        });
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
