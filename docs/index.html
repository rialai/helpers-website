<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helpers.ie</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
    p {
      font: 300 clamp(18px, 4vw, 32px) system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      letter-spacing: 0.04em;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      12% { opacity: 1; }
      25% { opacity: 0.45; }
      37% { opacity: 0.9; }
      55% { opacity: 0.35; }
    }
  </style>
</head>
<body>
  <p>help is on the way</p>
</body>
</html>
