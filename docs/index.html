<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helpers.ie</title>
  <style>
    html,
    body,
    canvas {
      margin: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <canvas id="fractal"></canvas>
  <script>
    const canvas = document.getElementById("fractal");
    const ctx = canvas.getContext("2d", { alpha: false });

    const state = {
      cx: -0.743643887037151,
      cy: 0.13182590420533,
      scale: 3.2,
      maxIterations: 150,
      time: 0
    };

    const renderSize = {
      w: 0,
      h: 0
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      const targetW = Math.max(320, Math.floor(window.innerWidth * dpr * 0.55));
      const targetH = Math.max(200, Math.floor(window.innerHeight * dpr * 0.55));

      renderSize.w = targetW;
      renderSize.h = targetH;

      canvas.width = targetW;
      canvas.height = targetH;
      canvas.style.width = "100vw";
      canvas.style.height = "100vh";

      ctx.imageSmoothingEnabled = false;
    }

    function palette(t) {
      const r = Math.floor(127 + 127 * Math.cos(6.2831 * (t + 0.0)));
      const g = Math.floor(127 + 127 * Math.cos(6.2831 * (t + 0.33)));
      const b = Math.floor(127 + 127 * Math.cos(6.2831 * (t + 0.67)));
      return [r, g, b];
    }

    function drawMandelbrot() {
      const w = renderSize.w;
      const h = renderSize.h;
      const image = ctx.createImageData(w, h);
      const data = image.data;
      const aspect = w / h;

      const halfX = state.scale * 0.5;
      const halfY = halfX / aspect;
      const minX = state.cx - halfX;
      const minY = state.cy - halfY;

      let ptr = 0;
      for (let py = 0; py < h; py++) {
        const y0 = minY + (py / h) * (halfY * 2);
        for (let px = 0; px < w; px++) {
          const x0 = minX + (px / w) * (halfX * 2);

          let x = 0;
          let y = 0;
          let iter = 0;

          while (x * x + y * y <= 4 && iter < state.maxIterations) {
            const xt = x * x - y * y + x0;
            y = 2 * x * y + y0;
            x = xt;
            iter++;
          }

          if (iter === state.maxIterations) {
            data[ptr++] = 0;
            data[ptr++] = 0;
            data[ptr++] = 0;
            data[ptr++] = 255;
            continue;
          }

          const smooth = iter - Math.log2(Math.log2(x * x + y * y));
          const t = (smooth * 0.018 + state.time * 0.04) % 1;
          const [r, g, b] = palette(t);

          data[ptr++] = r;
          data[ptr++] = g;
          data[ptr++] = b;
          data[ptr++] = 255;
        }
      }

      ctx.putImageData(image, 0, 0);
    }

    function animate() {
      state.time += 0.012;
      state.scale *= 0.987;

      if (state.scale < 0.000006) {
        state.scale = 3.2;
        state.time = 0;
      }

      const zoomLevel = Math.max(0, Math.log10(3.2 / state.scale));
      state.maxIterations = Math.min(420, 150 + Math.floor(zoomLevel * 32));

      drawMandelbrot();
      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", () => {
      resize();
      drawMandelbrot();
    });

    resize();
    animate();
  </script>
</body>
</html>
