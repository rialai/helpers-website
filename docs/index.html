<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helpers.ie</title>
</head>
<body>
  <p>Разговариваем с вами лично, неограниченное время.</p>
  <p>Добавляем в чат с предпринимателями и изобретателями.</p>

  <script>
    function hitCounter(url) {
      const beacon = new Image();
      beacon.referrerPolicy = "no-referrer";
      beacon.src = url;
    }

    function trackVisit() {
      hitCounter("https://hits.sh/helpers.ie-total.svg?label=total%20visits&color=007ec6");
      const today = new Date().toISOString().slice(0, 10);
      hitCounter("https://hits.sh/helpers.ie-" + today + ".svg?label=today%20visits&color=8c7ae6");
    }

    trackVisit();
  </script>
</body>
</html>
