<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>helpers.ie</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ebe2; }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    const C = document.getElementById('c');
    const X = C.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    let W, H;

    function resize() {
      W = innerWidth; H = innerHeight;
      C.width = W * dpr; C.height = H * dpr;
      C.style.width = W + 'px'; C.style.height = H + 'px';
      X.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    addEventListener('resize', () => { X.resetTransform(); resize(); });

    const T0 = performance.now();

    /* ── Gradient Blobs ── */
    const blobs = [
      { // emerald green — Irish green
        x: 0.2, y: 0.3, r: 0.38,
        vx: 0.012, vy: 0.008,
        color: [30, 120, 60],
        phase: 0
      },
      { // gold — Celtic gold
        x: 0.75, y: 0.25, r: 0.32,
        vx: -0.009, vy: 0.011,
        color: [195, 165, 55],
        phase: 1.2
      },
      { // deep purple — Book of Kells
        x: 0.15, y: 0.15, r: 0.35,
        vx: 0.007, vy: -0.006,
        color: [110, 60, 170],
        phase: 2.4
      },
      { // warm coral/rose
        x: 0.55, y: 0.45, r: 0.4,
        vx: -0.008, vy: 0.007,
        color: [210, 90, 100],
        phase: 3.6
      },
      { // dark olive — earth
        x: 0.8, y: 0.75, r: 0.34,
        vx: 0.006, vy: -0.01,
        color: [130, 120, 55],
        phase: 4.8
      },
      { // mauve/plum
        x: 0.35, y: 0.8, r: 0.3,
        vx: -0.011, vy: -0.005,
        color: [160, 80, 140],
        phase: 5.5
      }
    ];

    /* ── Noise grain texture ── */
    let grainCanvas, grainCtx;
    function makeGrain() {
      grainCanvas = document.createElement('canvas');
      grainCanvas.width = 256; grainCanvas.height = 256;
      grainCtx = grainCanvas.getContext('2d');
      const img = grainCtx.createImageData(256, 256);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = 18;
      }
      grainCtx.putImageData(img, 0, 0);
    }
    makeGrain();

    function frame(now) {
      const t = (now - T0) / 1000;
      const s = Math.min(W, H);

      /* ── Background ── */
      X.fillStyle = '#f0ebe2';
      X.fillRect(0, 0, W, H);

      /* ── Draw blobs ── */
      for (const b of blobs) {
        // Organic drifting motion
        const bx = (b.x + Math.sin(t * b.vx * 2 + b.phase) * 0.15 +
                    Math.sin(t * b.vy * 1.3 + b.phase * 0.7) * 0.08) * W;
        const by = (b.y + Math.cos(t * b.vy * 2 + b.phase + 1) * 0.12 +
                    Math.cos(t * b.vx * 1.7 + b.phase * 1.3) * 0.06) * H;
        const br = b.r * s * (0.9 + Math.sin(t * 0.3 + b.phase) * 0.1);

        const g = X.createRadialGradient(bx, by, 0, bx, by, br);
        const [r, gn, bl] = b.color;
        g.addColorStop(0, `rgba(${r},${gn},${bl},0.65)`);
        g.addColorStop(0.4, `rgba(${r},${gn},${bl},0.35)`);
        g.addColorStop(0.7, `rgba(${r},${gn},${bl},0.1)`);
        g.addColorStop(1, `rgba(${r},${gn},${bl},0)`);

        X.fillStyle = g;
        X.fillRect(0, 0, W, H);
      }

      /* ── Grain overlay ── */
      X.globalAlpha = 1;
      const pat = X.createPattern(grainCanvas, 'repeat');
      X.fillStyle = pat;
      X.fillRect(0, 0, W, H);

      /* ── Text ── */
      const fontSize = Math.round(s * 0.13);
      X.save();
      X.globalCompositeOperation = 'color-burn';
      X.font = `700 ${fontSize}px 'Georgia', 'Times New Roman', serif`;
      X.textAlign = 'center';
      X.textBaseline = 'middle';

      // measure for two-line layout
      const line1 = 'help is';
      const line2 = 'on the way';
      const leading = fontSize * 1.05;
      const cy = H / 2;

      X.fillStyle = '#1a1a2e';
      X.fillText(line1, W / 2, cy - leading * 0.45);
      X.fillText(line2, W / 2, cy + leading * 0.55);
      X.restore();

      /* ── Subtle subtext ── */
      X.globalAlpha = 0.4;
      X.font = `400 ${Math.round(s * 0.015)}px system-ui, -apple-system, sans-serif`;
      X.textAlign = 'center';
      X.textBaseline = 'middle';
      X.fillStyle = '#5a5a5a';
      X.letterSpacing = '0.2em';
      X.fillText('HELPERS.IE', W / 2, H * 0.92);
      X.globalAlpha = 1;

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
