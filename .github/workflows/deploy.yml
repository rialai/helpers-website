name: Deploy to Google Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            cd ${{ secrets.BENCH_PATH }}
            
            # Update the app from GitHub
            cd apps/helpers_website
            git fetch origin
            git checkout main
            git pull origin main
            
            # Go back to bench root and run migrations
            cd ../..
            bench migrate
            
            # Clear cache
            bench clear-cache
            
            # Optional: Restart Frappe (if needed)
            # sudo systemctl restart frappe-bench.service
            
            echo "✅ Deploy completed successfully"
