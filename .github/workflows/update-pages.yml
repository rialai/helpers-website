name: Update GitHub Pages Data

# Run on schedule (daily at midnight UTC)
on:
  schedule:
    - cron: '0 0 * * *'
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  export-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Export graph data from Frappe
        env:
          FRAPPE_URL: ${{ secrets.FRAPPE_URL }}
          FRAPPE_TOKEN: ${{ secrets.FRAPPE_TOKEN }}
        run: |
          pip install frappe-client requests
          python3 export_for_github_pages.py

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Commit and push changes
        run: |
          if git diff --quiet docs/data/graph.json; then
            echo "No changes to graph data"
          else
            git add docs/data/graph.json
            git commit -m "chore: update graph data from Frappe [skip ci]"
            git push origin main
          fi

  pages:
    needs: export-data
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
