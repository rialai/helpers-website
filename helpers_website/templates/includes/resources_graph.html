{% comment %}
Resources Graph Component - Displays enterprise resources visualization
{% endcomment %}

<div class="resources-graph-section">
	<style>
		.resources-graph-section {
			position: relative;
			width: 100%;
			height: 400px;
			border-bottom: 1px solid #1f1f1f;
			margin: 60px 0;
			background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
			border-radius: 12px;
			overflow: hidden;
		}

		.resources-graph-section canvas {
			display: block;
			width: 100%;
			height: 100%;
		}

		.resources-graph-overlay {
			position: absolute;
			inset: 0;
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			background: rgba(0, 0, 0, 0.3);
			pointer-events: none;
			color: #9ea0a3;
		}

		.resources-graph-label {
			font-size: 14px;
			letter-spacing: 0.6px;
			text-transform: uppercase;
			margin-bottom: 8px;
		}

		.resources-graph-count {
			font-size: 24px;
			font-weight: 600;
			color: #f5f5f5;
		}
	</style>

	<canvas id="resources-graph-canvas"></canvas>
	
	<div class="resources-graph-overlay">
		<div class="resources-graph-label">Enterprise Resources</div>
		<div class="resources-graph-count" id="resources-count">Loading...</div>
	</div>
</div>

<script src="/assets/helpers_website/js/resources-graph.js"></script>

<script>
	// Wait for the graph to load and update count
	(function() {
		let checkCount = 0;
		const checkInterval = setInterval(() => {
			if (window.ResourcesGraph && window.ResourcesGraph.nodes.length > 0) {
				document.getElementById('resources-count').textContent = 
					window.ResourcesGraph.nodes.length + ' Resources';
				clearInterval(checkInterval);
			}
			checkCount++;
			if (checkCount > 50) clearInterval(checkInterval);
		}, 100);
	})();
</script>
